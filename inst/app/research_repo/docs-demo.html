<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>Document Search</title>
    <!-- Vuetify 3 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/vuetify@3.5.17/dist/vuetify.min.css"
      rel="stylesheet"
    />

    <!-- Material Design Icons (MDI) -->
    <link
      href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css"
      rel="stylesheet"
    />

    <!-- Material Design Icons Iconfont (Classic) -->
    <link
      href="https://cdn.jsdelivr.net/npm/material-design-icons-iconfont@7.0.1/dist/material-design-icons.css"
      rel="stylesheet"
    />

    <!-- Splitpanes styles -->
    <link
      href="https://cdn.jsdelivr.net/npm/splitpanes@latest/dist/splitpanes.css"
      rel="stylesheet"
    />

    <!-- Google Fonts: Material Symbols & Material Icons -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/vue@3.4.25/dist/vue.global.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3.5.17/dist/vuetify.min.js"></script>
    <link
      rel="modulepreload"
      href="https://cdn.jsdelivr.net/npm/@vueuse/core@10.9.0/+esm"
    />

    <!-- <link href="/css/ids.min.css" rel="stylesheet" /> -->
    <link href="css/universal.min.css" rel="stylesheet" />
    <link href="css/ids.min.css" rel="stylesheet" />

    <script
      type="text/javascript"
      src="https://pym.nprapps.org/pym.v1.min.js"
    ></script>
    <script>
      window.onload = function () {
        var pymChild = new pym.Child({ polling: 500 });
      };
    </script>
    <!-- <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("public/service-worker.js");
      }
    </script> -->

    <script type="importmap">
      {
        "imports": {
          "@ai4data/search": "https://esm.sh/@ai4data/search@0.1.5",
          "@ai4data/search/worker": "https://esm.sh/@ai4data/search@0.1.5/worker"
        }
      }
    </script>

    <style>
      :root {
        --secondary-100: #f3f5fc;
      }

      .bg-secondary-100 {
        background-color: var(--secondary-100);
      }

      .search-buttons {
        color: #0c1a4d;
        font-size: 24px;
        width: 24px;
        height: 24px;
      }

      .card-icons {
        color: var(--primary-dark);
        font-size: 15px;
        width: 15px;
        height: 15px;
      }

      .full-page-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(255, 255, 255, 0.75);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
      }

      .doi-link {
        color: var(--primary-dark);
        text-decoration: none;
        font-weight: 500;
      }

      .doi-link:hover {
        text-decoration: underline;
      }

      .pdf-link {
        color: var(--primary-dark);
      }

      .pdf-link:hover {
        color: var(--primary);
        text-decoration: underline;
      }

      .pdf-viewer-wrap {
        position: relative;
        height: 80vh;
        min-height: 400px;
        display: flex;
        flex-direction: column;
      }

      .pdf-viewer-wrap.pdf-viewer-external {
        height: auto;
        min-height: 0;
      }

      .pdf-viewer-external-card {
        padding: 1.25rem;
        background: rgba(0, 0, 0, 0.04);
        border-radius: 8px;
      }

      .pdf-viewer-external-msg {
        margin: 0;
        font-size: 0.9375rem;
        color: rgba(0, 0, 0, 0.75);
        line-height: 1.5;
      }

      .pdf-link-button {
        font-weight: 500;
      }

      .pdf-viewer-links {
        flex-shrink: 0;
        font-size: 0.875rem;
      }

      .pdf-viewer-links-sep {
        margin: 0 0.5rem;
        color: rgba(0, 0, 0, 0.4);
      }

      .pdf-viewer-timeout-msg {
        flex-shrink: 0;
        padding: 0.5rem 0;
        font-size: 0.8125rem;
        color: rgba(0, 0, 0, 0.7);
      }

      .pdf-viewer-loading {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.9);
        z-index: 2;
        font-size: 0.875rem;
        color: rgba(0, 0, 0, 0.7);
      }

      .pdf-viewer-loading-hint {
        font-size: 0.75rem;
        color: rgba(0, 0, 0, 0.5);
        margin-top: 0.25rem;
      }

      .pdf-viewer-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(0, 0, 0, 0.1);
        border-top-color: var(--primary-dark, #0c1a4d);
        border-radius: 50%;
        animation: pdf-viewer-spin 0.8s linear infinite;
        margin-bottom: 0.75rem;
      }

      @keyframes pdf-viewer-spin {
        to {
          transform: rotate(360deg);
        }
      }

      .pdf-viewer-iframe {
        flex: 1;
        min-height: 0;
        border: none;
      }

      .search-content-root {
        width: 100%;
      }

      /*
       * Non-expanded view: row fills viewport so no large gap at bottom;
       * results and detail columns get height from row and scroll internally.
       */
      .search-content-root .search-content.mt-md-2 {
        height: calc(100vh - 8rem);
        min-height: 16rem;
      }

      .search-content__result {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .search-content__result .search-content__result__area {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .search-content__result .scroll-area {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .search-content__result .scroll-area .v-infinite-scroll {
        overflow: visible;
      }

      .search-content__detail {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }

      .search-content__detail .search-content__detail__description {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .search-content__detail
        .search-content__detail__description
        .scroll-area {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .search-content__detail
        .search-content__detail__description
        .scroll-area
        .v-infinite-scroll {
        overflow: visible;
      }

      /*
       * Expanded layout: real two-column HTML (no display:contents).
       * Left column = search bar on top + results list below. Right column = detail panel.
       * Scroll: give grid a fixed height (100vh) so rows are bounded; then each column
       * uses flex + min-height: 0 so the scrollable area gets a height and overflow works.
       */
      .expanded-layout {
        display: grid;
        /* Left column: use --result-list-width when set (matches non-expanded), else 1fr */
        grid-template-columns: var(--result-list-width, 1fr) minmax(320px, 2fr);
        grid-template-rows: 1fr;
        gap: 0 1rem;
        height: 100vh;
        max-height: 100vh;
        width: 100%;
        max-width: 100%;
        box-sizing: border-box;
        overflow: hidden;
      }

      .expanded-layout__left {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }

      .expanded-layout__search {
        flex-shrink: 0;
      }

      .expanded-layout__results {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }

      /* Let .expanded-layout__results be the scroll container; override .scroll-area so it doesn’t fight (no height:100%) */
      .expanded-layout__results .search-content__result__area {
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .expanded-layout__results .scroll-area {
        height: auto;
        min-height: 0;
        overflow: visible;
        flex: none;
      }

      .expanded-layout__results .scroll-area .v-infinite-scroll {
        overflow: visible;
      }

      .expanded-layout__right {
        display: flex;
        flex-direction: column;
        min-width: 0;
        min-height: 0;
        background: var(--secondary-100);
        overflow: hidden;
      }

      .expanded-layout__description {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        margin-left: 0;
        margin-right: 0;
        overflow: hidden;
      }

      .expanded-layout__scroll {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }

      .expanded-layout__scroll .scroll-area {
        height: auto;
        overflow: visible;
      }

      .v-container--search.v-container--detail-expanded {
        max-width: 100% !important;
      }

      .search-content__detail__info--compact h6,
      .search-content__detail__info--compact .text-xl {
        font-size: 1rem !important;
      }

      /* Expanded header: DOI + geographic/time/source on one line; vertical center align items */
      .expanded-layout__header-meta {
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        gap: 0.5rem 0.75rem;
        margin-top: 0.5rem;
        overflow-x: auto;
        min-width: 0;
      }

      .expanded-layout__header-meta .d-flex.text-gray-600,
      .expanded-layout__header-meta .d-flex.text-dark-gray,
      .expanded-layout__header-meta
        .d-flex.align-center.flex-wrap.text-gray-600 {
        margin-top: 0 !important;
        align-items: center;
      }

      .expanded-layout__header-meta .d-flex.text-dark-gray {
        flex-wrap: nowrap;
      }

      .search-content__detail__info--compact {
        flex-shrink: 0;
      }

      .search-content__detail__info--compact
        .search-content__detail__info__content {
        flex-grow: 0;
      }

      .search-content__detail__info--compact .d-flex.text-dark-gray,
      .search-content__detail__info--compact
        .d-flex.align-center.flex-wrap.text-gray-600 {
        margin-top: 0.5rem !important;
        font-size: 0.75rem;
      }

      /* Override compact margin so DOI and geo/time/source row stay on one line (higher specificity) */
      .search-content__detail__info--compact
        .expanded-layout__header-meta
        .d-flex.text-gray-600,
      .search-content__detail__info--compact
        .expanded-layout__header-meta
        .d-flex.text-dark-gray {
        margin-top: 0 !important;
      }

      @media (max-width: 599px) {
        .expanded-layout {
          grid-template-columns: 1fr;
        }
      }

      .metadata-document .metadata-section-title {
        letter-spacing: 0.02em;
        text-transform: capitalize;
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        padding-bottom: 0.35rem;
      }

      .metadata-document .metadata-row {
        line-height: 1.5;
      }

      .metadata-document .metadata-row .metadata-label {
        width: 10rem;
        min-width: 10rem;
        flex-shrink: 0;
        padding-right: 0.5rem;
      }

      .metadata-document .metadata-row .metadata-value {
        min-width: 0;
        flex: 1 1 auto;
      }

      .metadata-document .metadata-row-pills .metadata-value {
        display: block;
      }

      .metadata-document .metadata-html {
        display: block;
        word-break: break-word;
      }

      .metadata-document .metadata-nested {
        padding-left: 1rem;
        margin-top: 0.25rem;
        border-left: 2px solid rgba(0, 0, 0, 0.08);
      }

      .metadata-document .metadata-nested-row {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 0 0.5rem;
        margin-bottom: 0.35rem;
        line-height: 1.45;
      }

      .metadata-document .metadata-nested-row .metadata-label {
        min-width: 8rem;
        flex-shrink: 0;
        font-size: 0.75rem;
        opacity: 0.85;
      }

      .metadata-document .metadata-array-item {
        margin-bottom: 0.75rem;
        padding: 0.5rem 0;
        border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      }

      .metadata-document .metadata-array-item:last-child {
        border-bottom: none;
        margin-bottom: 0;
      }

      .metadata-document .metadata-pills-block {
        display: block;
        padding-left: 1rem;
        border-left: 2px solid rgba(0, 0, 0, 0.08);
        width: 100%;
        box-sizing: border-box;
      }

      .metadata-document .metadata-pills-group:last-child {
        margin-bottom: 0;
      }

      .metadata-document .metadata-pills-vocabulary {
        letter-spacing: 0.02em;
      }

      .metadata-document .metadata-pills-list {
        gap: 0.35rem;
      }

      .metadata-document .metadata-pill {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        font-size: 0.8125rem;
        font-weight: 500;
        color: var(--primary-dark, #0c1a4d);
        background: rgba(12, 26, 77, 0.08);
        border-radius: 9999px;
        border: 1px solid rgba(12, 26, 77, 0.12);
      }

      .metadata-document .metadata-authors-inline {
        padding-left: 1rem;
        border-left: 2px solid rgba(0, 0, 0, 0.08);
        width: 100%;
        box-sizing: border-box;
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 0.25rem 0;
        line-height: 1.7;
      }

      .metadata-document .metadata-authors-item {
        display: inline-flex;
        align-items: center;
        padding: 0.25rem 0;
      }

      .metadata-document .metadata-authors-name {
        font-weight: 500;
        color: var(--primary-dark, #0c1a4d);
        font-size: 0.9375rem;
      }

      .metadata-document .metadata-authors-sep {
        color: rgba(0, 0, 0, 0.4);
        font-weight: 600;
        font-size: 1rem;
        padding: 0 0.6rem;
        user-select: none;
        vertical-align: middle;
      }

      .metadata-document .metadata-namecode-inline {
        padding-left: 1rem;
        border-left: 2px solid rgba(0, 0, 0, 0.08);
        width: 100%;
        box-sizing: border-box;
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 0.25rem 0;
        line-height: 1.6;
      }

      .metadata-document .metadata-namecode-item {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
      }

      .metadata-document .metadata-namecode-code {
        font-size: 0.6875rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        color: var(--primary-dark, #0c1a4d);
        background: rgba(12, 26, 77, 0.08);
        padding: 0.2rem 0.45rem;
        border-radius: 4px;
        flex-shrink: 0;
      }

      .metadata-document .metadata-namecode-name {
        font-weight: 500;
        font-size: 0.875rem;
        color: var(--primary-dark, #0c1a4d);
      }

      .metadata-document .metadata-namecode-sep {
        color: rgba(0, 0, 0, 0.35);
        font-weight: 600;
        font-size: 0.75rem;
        padding: 0 0.35rem;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <v-app>
        <main class="v-main">
          <v-container
            fluid
            class="v-container--search"
            :class="{ 'v-container--detail-expanded': detailExpanded }"
          >
            <div class="search-content-root">
              <!-- Normal layout: search bar full width, then row with results | detail. On mobile (width < 960) always use this layout. -->
              <template v-if="!detailExpanded || busy || width < 960">
                <div class="px-4 px-md-0 mt-md-9 search-bar-wrapper">
                  <div
                    class="position-relative search-bar-area search-bar"
                    @click="isActive = true"
                    v-click-outside="handleClickOutside"
                  >
                    <div class="custom-search-bar-filter">
                      <div class="custom-search-bar-filter__content">
                        <div
                          class="grow-wrap"
                          ref="textareaGrowWrap"
                          :class="{ active: isActive }"
                        >
                          <textarea
                            v-model="query"
                            name="text"
                            :maxlength="5000"
                            rows="1"
                            id="text"
                            placeholder="What are you looking for?"
                            @input="updateReplicatedValue"
                            @keydown="handleKeyDown"
                          ></textarea>
                        </div>
                      </div>
                      <div
                        class="custom-search-bar-filter__append position-relative align-self-stretch"
                        style="min-height: 0"
                      >
                        <span
                          v-if="indexReady && !modelReady"
                          class="rounded-circle position-absolute"
                          style="
                            width: 5px;
                            height: 5px;
                            background-color: #4caf50;
                            left: 10px;
                            top: 50%;
                            transform: translateY(-50%);
                          "
                          title="BM25 (lexical) active"
                        ></span>
                        <div
                          class="right-icons-container d-flex align-center h-100"
                          :class="{ 'pl-6': indexReady && !modelReady }"
                        >
                          <div
                            class="w-[30px] h-[30px] custom-search-bar-filter__icon d-flex justify-center align-center"
                            v-if="(!query && !tempFile) || isListening === true"
                          >
                            <i
                              class="v-icon material-symbols-outlined cursor-pointer search-icon semibold search-buttons"
                              size="24"
                              onclick="onMicrophoneClick()"
                              aria-label="Voice search"
                            >
                              settings_voice
                            </i>
                          </div>
                          <div
                            class="d-flex right-icons-container__append"
                            v-else
                          >
                            <v-icon-custom
                              size="24"
                              icon="cancel"
                              type="symbol"
                              class="v-icon--clickable v-btn--close custom-search-bar-filter__icon"
                              outlined
                              aria-label="clear"
                              @click="clearSearch"
                            ></v-icon-custom>
                            <v-btn
                              aria-label="search"
                              class="h-[30px]"
                              size="small"
                              @click="submit"
                            >
                              <i
                                class="material-icons v-icon notranslate v-theme--light v-icon--size-default"
                                aria-hidden="true"
                                >arrow_forward_ios</i
                              >
                            </v-btn>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <v-row
                  v-if="busy"
                  class="d-flex ga-md-5 mx-0 search-content mt-md-2"
                >
                  <v-col
                    cols="12"
                    md="4"
                    class="search-content__result pa-4 px-md-0"
                  >
                    <v-skeleton-loader
                      class="mx-auto w-100 border"
                      elevation="12"
                      type="list-item-two-line, list-item-three-line"
                    ></v-skeleton-loader>
                    <v-skeleton-loader
                      class="mx-auto w-100 border mt-6"
                      elevation="12"
                      type="list-item-two-line, list-item-three-line"
                    ></v-skeleton-loader>

                    <v-skeleton-loader
                      class="mx-auto w-100 border mt-6"
                      elevation="12"
                      type="list-item-two-line, list-item-three-line"
                    ></v-skeleton-loader>
                  </v-col>
                  <v-col
                    cols="12"
                    md="8"
                    class="search-content__detail pa-4 relative"
                  >
                    <v-skeleton-loader
                      class="mx-auto w-100 border"
                      elevation="12"
                      theme="light"
                      type="avatar, list-item-three-line, list-item-three-line, list-item-two-line, list-item-two-line, list-item-two-line, list-item-two-line, list-item-two-line"
                    />
                  </v-col>
                </v-row>
                <v-row
                  v-else
                  ref="searchContentRow"
                  class="d-flex ga-md-5 mx-0 search-content mt-md-2"
                  :class="{ 'animation-slide': itemSelected === true }"
                >
                  <v-col
                    v-show="!isFullscreen"
                    cols="12"
                    md="4"
                    class="search-content__result px-4 px-md-0"
                    ref="scrollSearchContentResultMobile"
                  >
                    <div
                      class="d-flex flex-column search-content__result__area"
                    >
                      <div
                        class="scroll-area"
                        ref="scrollSearchContentResultDesktop"
                      >
                        <div
                          v-if="indexReady && fullResults.length === 0"
                          class="text-center pa-8 text-medium-emphasis"
                        >
                          No documents in this index. Check the manifest URL or
                          try a search.
                        </div>
                        <v-infinite-scroll
                          v-else-if="!reranking && fullResults.length > 0 && semanticResults.length > 0"
                          :items="semanticResults"
                          @load="loadMore"
                          class="scroll-panel"
                          color="primary"
                        >
                          <!-- CardResult -->
                          <template
                            v-for="(result, index) in semanticResults"
                            :key="result.idno ?? result.id ?? result.code"
                          >
                            <div
                              @click="(e) => handleResultSearchClick(e, result)"
                            >
                              <v-card
                                flat
                                class="card-result relative"
                                :class="{
    active: viewItem?.idno === result?.idno,
    'mt-3': index !== 0,
  }"
                                :link="false"
                              >
                                <div class="d-flex align-center mb-3 type-info">
                                  <i
                                    class="v-icon material-symbols-outlined v-icon--clickable v-btn--close custom-search-bar-filter__icon card-icons"
                                    size="15"
                                    onclick="clearSearch()"
                                    aria-label="clear"
                                  >
                                    {{ icons[result.type]?.name ?? 'more_horiz'
                                    }}
                                  </i>
                                  <div class="text-xs text-capitalize">
                                    {{ result?.type }}
                                  </div>
                                  <div
                                    v-if="result?.type_extra"
                                    class="text-xs text-capitalize ml-1"
                                  >
                                    [{{ result?.type_extra }}]
                                  </div>
                                </div>
                                <v-card-title
                                  color="primary-dark"
                                  class="leading-1.3"
                                  >{{ result?.title }}</v-card-title
                                >
                                <v-card-subtitle v-if="result?.sub_title"
                                  >{{ result?.sub_title ?? ''
                                  }}</v-card-subtitle
                                >
                                <v-card-text v-if="result?.text"
                                  >{{ result?.text ?? '-' }}</v-card-text
                                >
                                <div
                                  class="mt-4 d-flex flex-wrap align-center text-body-3 categories"
                                >
                                  <div
                                    v-if="result?.geographic_coverage?.length === 1"
                                    class="category-item"
                                  >
                                    <i
                                      class="mdi mdi-earth v-icon notranslate v-theme--light v-icon--size-default material-symbols-outlined"
                                      aria-hidden="true"
                                    ></i>
                                    <div>
                                      {{

                                              v-else-if="isNameCodeArray(val)"
                                            >

                                                class="metadata-namecode-inline"
                                              >

                                                  v-for="(item, index) in formatNameCodeList(val)"
                                                  :key="index"
                                                  class="metadata-namecode-item"
                                                >
                                                  <span
                                                    class="metadata-namecode-code"
                                                    >{{ item.code }}</span
                                                  >
                                                  <span
                                                    class="metadata-namecode-name"
                                                    >{{ item.name }}</span
                                                  >
                                                  <span
                                                    v-if="index < formatNameCodeList(val).length - 1"
                                                    class="metadata-namecode-sep"
                                                    aria-hidden="true"
                                                    >·</span
                                                  >
                                                </span>
                                              </div>
                                            </template>
                                            <metadata-value
                                              v-else
                                              :value="val"
                                              :key-name="key"
                                              :format-key="formatMetadataKey"
                                            />
                                          </span>
                                        </div>
                                      </template>
                                      <div v-else class="metadata-row">
                                        <span class="metadata-value text-body-2"
                                          >{{ sectionVal == null ? '—' :
                                          String(sectionVal) }}</span
                                        >
                                      </div>
                                    </div>
                                  </v-card-text>
                                </v-container>
                              </template>
                            </div>
                          </div>
                        </div>
                      </template>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </v-container>
        </main>

        <div v-if="pageLoading || !indexReady" class="full-page-loading">
          <v-row align-content="center" class="fill-height" justify="center">
            <v-col class="text-subtitle-1 text-center" cols="12">
              <span v-if="loadingPhase" class="text-medium-emphasis"
                >{{ loadingPhase }}:</span
              >
              {{ loadingMessage }}
            </v-col>
            <v-col cols="6">
              <v-progress-linear
                color="var(--purple)"
                :size="70"
                height="6"
                indeterminate
                rounded
              ></v-progress-linear>

      </v-app>
    </div>

    <div
      id="firstLoading"
      class="full-page-loading"
      style="background-color: #f3f5fc; z-index: 999999 !important"
    ></div>
    <template id="v-icon-custom-template">
      <i
        class="v-icon material-symbols-outlined"
        :class="cls"
        v-if="type === 'symbol'"
        :size="size"
        :outlined="outlined"
        :style="computedStyle"
      >
        {{ icon }}
      </i>

      <v-icon
        v-else
        :class="cls"
        :color="color"
        :disabled="disabled"
        :end="end"
        :size="size"
        :start="start"
        :tag="tag"
        :theme="theme"
        :outlined="outlined"
        :icon="icon"
        :style="styles"
        :variant="variant"
      >
        {{ icon }}
      </v-icon>
    </template>

    <script>
      const VIconCustom = Vue.defineComponent({
        template: "#v-icon-custom-template",
        props: {
          icon: String,
          class: [String, Array, Object],
          mainClass: String,
          type: {
            type: String,
            default: "mdi",
          },
          color: String,
          disabled: Boolean,
          end: Boolean,
          size: [String, Number],
          start: Boolean,
          tag: String,
          theme: String,
          outlined: Boolean,
          variant: String,
          styles: Object,
        },
        computed: {
          cls() {
            return this.class;
          },
          computedStyle() {
            const size =
              typeof this.size === "string" ? parseInt(this.size) : this.size;
            return {
              color: this.color,
              fontSize: size ? size + "px" : undefined,
              width: size ? size + "px" : undefined,
              height: size ? size + "px" : undefined,
              ...(this.styles || {}),
            };
          },
        },
      });

      const isEmptyMetadataValue = (val) => {
        if (val === null || val === undefined) return true;
        if (typeof val === "string") return val.trim().length === 0;
        if (Array.isArray(val)) return val.length === 0;
        if (typeof val === "object") return Object.keys(val).length === 0;
        return false;
      };

      const MetadataValue = {
        name: "MetadataValue",
        props: {
          value: { required: true },
          keyName: { type: String, default: "" },
          formatKey: { type: Function, required: true },
        },
        computed: {
          parsedValue() {
            if (typeof this.value !== "string") return this.value;
            const s = this.value.trim();
            if ((s.startsWith("{") || s.startsWith("[")) && s.length > 1) {
              try {
                return JSON.parse(this.value);
              } catch (_) {
                return this.value;
              }
            }
            return this.value;
          },
        },
        methods: {
          hasValue(val) {
            return !isEmptyMetadataValue(val);
          },
        },
        template: `
          <span class="metadata-value-inner">
            <template v-if="value === null || value === undefined">—</template>
            <template v-else-if="(keyName === 'abstract' || keyName === 'description') && typeof value === 'string'">
              <span v-html="value" class="metadata-html"></span>
            </template>
            <template v-else-if="Array.isArray(value)">
              <template v-if="value.length === 0">—</template>
              <div v-else v-for="(item, i) in value" :key="i" class="metadata-array-item">
                <template v-if="item !== null && typeof item === 'object' && !Array.isArray(item)">
                  <div class="metadata-nested">
                    <template v-for="(v, k) in item" :key="k">
                      <div v-if="hasValue(v)" class="metadata-nested-row">
                        <span class="metadata-label">{{ formatKey(k) }}</span>
                        <metadata-value :value="v" :key-name="k" :format-key="formatKey" />
                      </div>
                    </template>
                  </div>
                </template>
                <metadata-value v-else :value="item" :key-name="''" :format-key="formatKey" />
              </div>
            </template>
            <template v-else-if="typeof value === 'object' && value !== null">
              <div class="metadata-nested">
                <template v-for="(v, k) in value" :key="k">
                  <div v-if="hasValue(v)" class="metadata-nested-row">
                    <span class="metadata-label">{{ formatKey(k) }}</span>
                    <metadata-value :value="v" :key-name="k" :format-key="formatKey" />
                  </div>
                </template>
              </div>
            </template>
            <template v-else-if="typeof value === 'string' && typeof parsedValue === 'object' && parsedValue !== null">
              <div class="metadata-nested" v-if="Array.isArray(parsedValue)">
                <div v-for="(item, i) in parsedValue" :key="i" class="metadata-array-item">
                  <template v-if="item !== null && typeof item === 'object' && !Array.isArray(item)">
                    <div class="metadata-nested">
                      <template v-for="(v, k) in item" :key="k">
                        <div v-if="hasValue(v)" class="metadata-nested-row">
                          <span class="metadata-label">{{ formatKey(k) }}</span>
                          <metadata-value :value="v" :key-name="k" :format-key="formatKey" />
                        </div>
                      </template>
                    </div>
                  </template>
                  <metadata-value v-else :value="item" :key-name="''" :format-key="formatKey" />
                </div>
              </div>
              <div class="metadata-nested" v-else>
                <template v-for="(v, k) in parsedValue" :key="k">
                  <div v-if="hasValue(v)" class="metadata-nested-row">
                    <span class="metadata-label">{{ formatKey(k) }}</span>
                    <metadata-value :value="v" :key-name="k" :format-key="formatKey" />
                  </div>
                </template>
              </div>
            </template>
            <template v-else-if="typeof value === 'string'">
              <span>{{ value }}</span>
            </template>
            <template v-else-if="typeof value === 'number' || typeof value === 'boolean'">{{ value }}</template>
            <template v-else>{{ value == null ? '—' : String(value) }}</template>
          </span>
        `,
      };
    </script>

    <script type="module">
      // import { SearchClient } from "../dist/index.mjs";
      import { SearchClient } from "@ai4data/search";
      const WORKER_URL = "https://esm.sh/@ai4data/search@0.1.5/worker";

      const { createApp, ref, onMounted, nextTick, watch, computed } = Vue;

      const params = new URLSearchParams(location.search);
      // Base path for GitHub Pages (e.g. /ai-for-data-blog); empty when served from repo root
      const basePathMatch = location.pathname.match(/^\/([^/]+)\/search\//);
      const basePath = basePathMatch ? "/" + basePathMatch[1] : "";
      // Default: {basePath}/data/prwp/manifest.json. Override with ?manifest=...
      const manifestUrl = params.get("manifest") || `data/prwp/manifest.json`;
      // ?skipModel=1 — skip loading the embedding model to test BM25 fallback (semantic/hybrid → lexical).
      const skipModelLoad = params.has("skipModel");
      // ?modelDelay=60 — delay loading the embedding model by N seconds so index + BM25 are ready first.
      const modelDelayParam = params.get("modelDelay");
      const modelLoadDelaySeconds =
        modelDelayParam != null
          ? Math.max(0, parseInt(modelDelayParam, 10) || 0)
          : undefined;
      const { createVuetify } = Vuetify;
      const vuetify = createVuetify({
        defaults: {},
        icons: {
          defaultSet: "md",
          sets: {
            md: {
              component: "v-icon", // uses <v-icon> by default
            },
          },
        },
      });

      const useRerank = false;
      let rerankWorker = null;
      if (useRerank) {
        rerankWorker = new Worker(
          new URL(
            "https://esm.sh/@ai4data/search@0.1.5/rank-worker",
            import.meta.url,
          ),
          {
            type: "module",
          },
        );
      }

      createApp({
        setup() {
          const query = ref("");
          const tab = ref(0);
          const selected = ref(null);
          const showMobileModal = ref(false);
          const fullResults = ref([]);
          const semanticResults = ref([]);
          const loadedCount = ref(0);
          const batchSize = 10;
          const loading = ref(false);
          const applyReranking = ref(false);
          const resultReranked = ref(false);
          const reranking = ref(false);
          const hasQueried = ref(false);
          const top_k = 20;
          const modelReady = ref(false);
          const indexReady = ref(false);
          const isActive = ref(false);
          const tempFile = ref(null);
          const isListening = ref(false);
          const textareaGrowWrap = ref(null);

          const handleClickOutside = () => {
            isActive.value = false;
          };

          const updateReplicatedValue = () => {
            const el = textareaGrowWrap.value;
            if (el) {
              const textarea = el.querySelector("textarea");
              if (textarea) el.dataset.replicatedValue = textarea.value;
            }
          };

          const dtype = "document";
          const viewItem = ref(null);
          const busy = ref(false);
          const width = ref(window.innerWidth);
          window.addEventListener("resize", () => {
            width.value = window.innerWidth;
          });
          const pageLoading = ref(true);
          const metadata = ref(null);
          const pdfURL = ref(null);
          const pdfLoading = ref(false);
          const pdfLoadTimeout = ref(false);
          const pdfLoadTimeoutId = ref(null);
          const pdfViewLoaded = ref(false);
          const pdfURLSameOrigin = computed(() => {
            const url = pdfURL.value;
            if (!url || typeof url !== "string") return false;
            try {
              return (
                new URL(url, window.location.href).origin ===
                window.location.origin
              );
            } catch {
              return false;
            }
          });
          const pdfIframeSrc = computed(() => {
            const url = pdfURL.value;
            if (!url || typeof url !== "string") return "";
            if (pdfURLSameOrigin.value) return url;
            return (
              "https://docs.google.com/gview?url=" +
              encodeURIComponent(url) +
              "&embedded=true"
            );
          });
          const loadingMessage = ref("Initializing…");
          const loadingPhase = ref("");
          const clientRef = ref(null);

          const scrollSearchContentResultMobile = ref(null);
          const scrollSearchContentResultDesktop = ref(null);
          const searchContentRow = ref(null);
          const btnContents = ref([
            {
              icon: "bolt",
              text: "Quick answer",
              key: "quick_answer",
              active: true,
              type: "indicator",
            },
            {
              icon: "storage",
              text: "Data",
              key: "data",
              active: false,
              type: "indicator",
            },
            {
              icon: "bar_chart_4_bars",
              text: "Visualizations",
              key: "visualizations",
              active: false,
              type: "indicator",
            },
            {
              icon: "description",
              text: "Metadata",
              key: "metadata",
              active: false,
              type: "indicator",
            },
            {
              icon: "account_tree",
              text: "See also",
              key: "see_also",
              active: false,
              type: "indicator",
            },
            {
              icon: "note",
              text: "Abstract",
              key: "abstract",
              active: true,
              type: "document",
            },
            {
              icon: "bolt",
              text: "View",
              key: "view",
              active: false,
              type: "document",
            },
            {
              icon: "scan",
              text: "Metadata",
              key: "metadata",
              active: false,
              type: "document",
            },
          ]);
          const filteredBtnContents = computed(() => {
            return btnContents.value.filter((btn) => btn.type === dtype);
          });

          const active_tab = ref(filteredBtnContents.value[0].key);

          const handleFilter = (btn, index) => {
            btn.active = true;
            active_tab.value = btn.key;
            filteredBtnContents.value.forEach((btn, i) => {
              if (i !== index) {
                btn.active = false;
              }
            });
          };

          const isFullscreen = ref(false);
          const detailExpanded = ref(false);
          const itemSelected = ref(false);
          /** When expanded, keep result list this width so it doesn't change from non-expanded */
          const resultListWidth = ref(null);

          const toggleDetailExpanded = () => {
            if (!detailExpanded.value) {
              // Measure result column width from DOM so expanded layout keeps the same width
              const rowRef = searchContentRow.value;
              const rowEl = rowRef?.$el ?? rowRef;
              const resultCol =
                rowEl instanceof HTMLElement
                  ? (rowEl.querySelector(".search-content__result") ??
                    rowEl.children[0])
                  : null;
              if (resultCol instanceof HTMLElement) {
                resultListWidth.value = Math.round(
                  resultCol.getBoundingClientRect().width,
                );
              } else {
                const col = scrollSearchContentResultMobile.value;
                const el = col?.$el ?? col;
                if (el instanceof HTMLElement) {
                  resultListWidth.value = Math.round(
                    el.getBoundingClientRect().width,
                  );
                }
              }
            }
            detailExpanded.value = !detailExpanded.value;
          };

          const infiniteHeight = ref(0);
          watch(
            () => width.value,
            () => {
              if (scrollSearchContentResultDesktop.value) {
                infiniteHeight.value =
                  scrollSearchContentResultDesktop.value.clientHeight ?? 0;
              }
            },
          );

          const format_authorities_title = (item) => {
            let name = "-";
            if (item?.source?.length === 1) {
              name = item?.source[0];
            }

            if (item?.source?.length > 1) {
              name = `${item?.source[0]} (+${item?.source?.length - 1})`;
            }
            return name;
          };

          const authorities_title = computed(() => {
            return format_authorities_title(viewItem.value);
          });

          // Prefetch metadata from ids-metadata for result cards (geographic_coverage, time_coverage, source)
          const enrichResultsWithMetadata = (results, limit = 20) => {
            const toEnrich = results.slice(0, limit);
            toEnrich.forEach((r) => {
              const idno = r.idno ?? r.id;
              if (!idno) return;
              fetch(`data/prwp/metadata/${dtype}_${idno}.json`)
                .then((res) => (res.ok ? res.json() : null))
                .then((meta) => {
                  if (!meta) return;
                  const dd = meta.document_description ?? meta;
                  const geo = dd.ref_country ?? dd.geographic_coverage;
                  const time = dd.date_published
                    ? String(dd.date_published).slice(0, 4)
                    : dd.time_coverage;
                  const src = dd.authors?.length
                    ? dd.authors
                        .map((a) => a.full_name ?? a.name ?? "")
                        .filter(Boolean)
                    : dd.source;
                  const idx = fullResults.value.findIndex(
                    (x) => (x.idno ?? x.id) === idno,
                  );
                  if (idx >= 0) {
                    Object.assign(fullResults.value[idx], {
                      geographic_coverage: geo,
                      time_coverage: time,
                      source: src,
                      sub_title: dd.title_statement?.sub_title ?? r.sub_title,
                      text: dd.abstract ?? r.text,
                    });
                  }
                })
                .catch(() => {});
            });
          };

          /** Fill the list from highlights (if manifest has index.highlights) else recent */
          const applyBrowseResults = async (results) => {
            fullResults.value = results;
            enrichResultsWithMetadata(results);
            semanticResults.value = [];
            await loadMore({ done: () => {} });
            busy.value = false;
            pageLoading.value = false;
          };

          /** Only request highlights here; `on('highlights')` falls back to getRecent if empty */
          const defaultBrowseLimit = 20;
          const loadDefaultList = () => {
            clientRef.value?.getHighlights(defaultBrowseLimit);
          };

          const submit = async () => {
            busy.value = true;
            selected.value = null;
            viewItem.value = null;
            loadedCount.value = 0;
            resultReranked.value = false;

            const text = query.value.trim();
            if (!text) {
              hasQueried.value = false;
              loadDefaultList();
              return;
            }

            hasQueried.value = true;
            clientRef.value?.search(text, { topK: 50, ef: 50, ef_upper: 5 });
          };

          const rerank = async () => {
            if (!query.value || query.value.trim() === "" || !rerankWorker)
              return;
            reranking.value = true;
            const batch = fullResults.value.slice(0, top_k);
            const documents = batch.map(
              (x) => x.title + "\n\n" + (x.abstract ?? ""),
            );
            const reranked = await new Promise((resolve, reject) => {
              rerankWorker.onmessage = (e) => resolve(e.data);
              rerankWorker.onerror = (err) => {
                console.error("Worker error:", err);
                reject(err);
              };
              rerankWorker.postMessage({
                query: query.value,
                documents,
                top_k,
              });
            });

            for (let i = 0; i < top_k; i++) {
              fullResults.value[i] = {
                ...batch[reranked[i].corpus_id],
                rerank_score: reranked[i].score,
              };
            }

            resultReranked.value = true;
            reranking.value = false;
          };

          const mockApi = async (data, buffer) => {
            const next = data.slice(buffer.length, buffer.length + batchSize);
            return new Promise((resolve) =>
              setTimeout(() => resolve(next), 500),
            );
          };

          const loadMore = async ({ done }) => {
            loading.value = true;
            const res = await mockApi(fullResults.value, semanticResults.value);
            loading.value = false;

            if (res.length === 0) {
              done("empty");
              return;
            }
            semanticResults.value.push(...res);
            loadedCount.value = semanticResults.value.length;

            if (viewItem.value === null) {
              if (width.value >= 960) {
                selectItem(res[0]);
              }
            }

            done("ok");
          };

          const selectItem = (item) => {
            viewItem.value = item;
            tab.value = 0;
            if (window.innerWidth < 960) {
              showMobileModal.value = true;
            }
            loadMetadata();
          };

          const closeMobileModal = () => {
            showMobileModal.value = false;
          };

          const clearSearch = () => {
            query.value = "";
            viewItem.value = null;
            semanticResults.value = [];
            hasQueried.value = false;
            submit();
          };

          const loadMetadata = () => {
            const item = viewItem.value;
            const idno = item?.idno ?? item?.id;
            if (!idno) return;
            const url = `data/prwp/metadata/${dtype}_${idno}.json`;
            fetch(url)
              .then(async (res) => {
                if (!res.ok) return null;
                try {
                  return await res.json();
                } catch {
                  return null;
                }
              })
              .then((data) => {
                // Only apply if still viewing this document (avoid stale response overwriting)
                if ((viewItem.value?.idno ?? viewItem.value?.id) !== idno)
                  return;
                if (data && typeof data === "object") {
                  // API may return { document_description, ... } or a flat object; ensure expected shape
                  metadata.value = data.document_description
                    ? data
                    : { document_description: data };
                  pdfURL.value =
                    metadata.value?.document_description?.url ?? null;
                } else {
                  metadata.value = {
                    document_description: {
                      idno: item?.idno ?? item?.id,
                      title: item?.title,
                      abstract: item?.text ?? item?.abstract,
                      type: item?.type,
                      doi: item?.doi,
                      url: item?.url,
                      date_published: item?.date_published,
                    },
                  };
                  pdfURL.value = item?.url ?? null;
                }
                pdfViewLoaded.value = false;
              })
              .catch(() => {
                if ((viewItem.value?.idno ?? viewItem.value?.id) !== idno)
                  return;
                metadata.value = {
                  document_description: {
                    idno: item?.idno ?? item?.id,
                    title: item?.title,
                    abstract: item?.text ?? item?.abstract,
                    type: item?.type,
                    doi: item?.doi,
                    url: item?.url,
                    date_published: item?.date_published,
                  },
                };
                pdfURL.value = item?.url ?? null;
                pdfViewLoaded.value = false;
              });
          };

          const onPdfIframeLoad = () => {
            pdfLoading.value = false;
            pdfViewLoaded.value = true;
            if (pdfLoadTimeoutId.value) {
              clearTimeout(pdfLoadTimeoutId.value);
              pdfLoadTimeoutId.value = null;
            }
          };

          watch(
            () => [active_tab.value, pdfURL.value],
            ([tab, url]) => {
              if (pdfLoadTimeoutId.value) {
                clearTimeout(pdfLoadTimeoutId.value);
                pdfLoadTimeoutId.value = null;
              }
              if (!url) {
                pdfLoading.value = false;
                pdfLoadTimeout.value = false;
                pdfViewLoaded.value = false;
                return;
              }
              if (tab === "view" && !pdfViewLoaded.value) {
                pdfLoading.value = true;
                pdfLoadTimeout.value = false;
                pdfLoadTimeoutId.value = setTimeout(() => {
                  pdfLoading.value = false;
                  pdfLoadTimeout.value = true;
                  pdfLoadTimeoutId.value = null;
                }, 50000);
              } else if (tab !== "view") {
                pdfLoading.value = false;
                pdfLoadTimeout.value = false;
              }
            },
            { immediate: true },
          );

          const sortTopKBy = (field) => {
            const sorted = fullResults.value
              .slice(0, top_k)
              .sort((a, b) => (b[field] ?? 0) - (a[field] ?? 0));

            fullResults.value = [...sorted, ...fullResults.value.slice(top_k)];
          };

          watch(applyReranking, async (newVal) => {
            if (!useRerank) return;
            if (newVal) {
              if (!resultReranked.value) {
                await rerank();
              } else {
                sortTopKBy("rerank_score");
              }
            } else {
              sortTopKBy("score");
            }

            semanticResults.value = [];
            await loadMore({ done: () => {} });
          });

          onMounted(() => {
            document.getElementById("firstLoading")?.remove();
            SearchClient.fromCDN(manifestUrl, {
              skipBm25: true,
              workerUrl: "https://esm.sh/@ai4data/search@0.1.5/worker",
              skipModelLoad,
              modelLoadDelaySeconds: skipModelLoad
                ? undefined
                : modelLoadDelaySeconds,
            })
              .then((client) => {
                clientRef.value = client;
                client.on("progress", (msg) => {
                  const p = msg.phase || "";
                  loadingPhase.value = p
                    ? p.charAt(0).toUpperCase() + p.slice(1)
                    : "";
                  loadingMessage.value = msg.message || "";
                });
                client.on("index_ready", () => {
                  indexReady.value = true;
                  pageLoading.value = false;
                  if (!hasQueried.value) loadDefaultList();
                });
                client.on("ready", (msg) => {
                  modelReady.value = msg.modelLoaded !== false;
                  indexReady.value = true;
                  loadingMessage.value = "Ready";
                  pageLoading.value = false;
                  if (!hasQueried.value) loadDefaultList();
                });
                client.on("results", async (msg) => {
                  const results = msg.data || [];
                  fullResults.value = results;
                  enrichResultsWithMetadata(results);
                  semanticResults.value = [];
                  await loadMore({ done: () => {} });
                  busy.value = false;
                  pageLoading.value = false;
                });
                client.on("highlights", async (msg) => {
                  const results = msg.data || [];
                  if (results.length > 0) {
                    await applyBrowseResults(results);
                  } else {
                    clientRef.value?.getRecent(defaultBrowseLimit);
                  }
                });
                client.on("recent", async (msg) => {
                  await applyBrowseResults(msg.data || []);
                });
                client.on("error", (msg) => {
                  console.error("[Worker error]", msg.message);
                  loadingMessage.value = "Error: " + (msg.message || "");
                  busy.value = false;
                  pageLoading.value = false;
                });
              })
              .catch((err) => {
                console.error("[SearchClient] fromCDN failed:", err);
                loadingMessage.value =
                  "Failed to load search: " + (err?.message || String(err));
                pageLoading.value = false;
              });
          });

          const handleKeyDown = (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
              // Prevent default behavior (adding a new line)
              event.preventDefault();
              submit();
            }
          };

          const handleResultSearchClick = (_event, result) => {
            if (result?.idno === viewItem.value?.idno) return;
            itemSelected.value = true;
            viewItem.value = result;
            loadMetadata();
          };

          const handleMetadataDownload = (idno, meta) => {
            if (!idno || !meta) return;
            const blob = new Blob([JSON.stringify(meta, null, 2)], {
              type: "application/json",
            });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `metadata_${idno}.json`;
            a.click();
            URL.revokeObjectURL(a.href);
          };

          const formatMetadataKey = (key) => {
            if (typeof key !== "string") return key;
            return key
              .replace(/_/g, " ")
              .replace(/\b\w/g, (c) => c.toUpperCase());
          };

          const hasMetadataValue = (val) => {
            if (val === null || val === undefined) return false;
            if (typeof val === "string") return val.trim().length > 0;
            if (Array.isArray(val)) return val.length > 0;
            if (typeof val === "object") return Object.keys(val).length > 0;
            return true;
          };

          const groupKeywordsByVocabulary = (keywords) => {
            if (!Array.isArray(keywords) || keywords.length === 0) return [];
            const map = {};
            for (const kw of keywords) {
              if (kw == null || typeof kw !== "object") continue;
              const vocab = kw.vocabulary ?? kw.Vocabulary ?? "Other";
              const name = kw.name ?? kw.Name ?? kw.title ?? kw.Title ?? "";
              if (String(name).trim()) {
                if (!map[vocab]) map[vocab] = [];
                map[vocab].push(String(name).trim());
              }
            }
            return Object.entries(map).map(([vocabulary, names]) => ({
              vocabulary,
              names,
            }));
          };

          const formatAuthorsForDisplay = (authors) => {
            if (!Array.isArray(authors) || authors.length === 0) return [];
            return authors
              .map((a) => {
                if (a == null || typeof a !== "object") return "";
                const full = a.full_name ?? a["Full Name"] ?? a.fullName ?? "";
                if (String(full).trim()) return String(full).trim();
                const last = a.last_name ?? a["Last Name"] ?? "";
                const first = a.first_name ?? a["First Name"] ?? "";
                const initial = a.initial ?? a.Initial ?? "";
                const parts = [last].filter(Boolean);
                if (first) parts.push(first);
                else if (initial) parts.push(initial);
                return parts.length ? parts.join(", ") : "";
              })
              .filter(Boolean);
          };

          const isNameCodeArray = (val) => {
            if (!Array.isArray(val) || val.length === 0) return false;
            return val.every((item) => {
              if (item == null || typeof item !== "object") return false;
              const hasName = ["name", "Name"].some(
                (k) => item[k] != null && String(item[k]).trim() !== "",
              );
              const hasCode = ["code", "Code"].some(
                (k) => item[k] != null && String(item[k]).trim() !== "",
              );
              return hasName || hasCode;
            });
          };

          const formatNameCodeList = (arr) => {
            if (!Array.isArray(arr) || arr.length === 0) return [];
            return arr
              .map((item) => {
                if (item == null || typeof item !== "object")
                  return { name: "—", code: "—" };
                const name = String(item.name ?? item.Name ?? "").trim() || "—";
                const code = String(item.code ?? item.Code ?? "").trim() || "—";
                return { name, code };
              })
              .filter((item) => item.name !== "—" || item.code !== "—");
          };

          const formatGeographicCoverageForInline = (coverage) => {
            if (!Array.isArray(coverage) || coverage.length === 0) return [];
            return coverage
              .map((item) => {
                if (item == null) return "";
                if (typeof item === "string") return item.trim();
                if (
                  typeof item === "object" &&
                  (item.title != null || item.name != null)
                ) {
                  return String(item.title ?? item.name ?? "").trim();
                }
                return "";
              })
              .filter(Boolean);
          };

          const icons = {
            microdata: { name: "database", outlined: false },
            geospatial: { name: "globe_asia", outlined: true },
            timeseries: { name: "chart_data", outlined: true },
            table: { name: "table", outlined: true },
            document: { name: "article", outlined: false },
            image: { name: "image", outlined: false },
            video: { name: "videocam", outlined: false },
            script: { name: "integration_instructions", outlined: false },
            indicator: { name: "monitoring", outlined: false },
          };

          return {
            query,
            tab,
            selected,
            semanticResults,
            selectItem,
            clearSearch,
            loadMore,
            submit,
            loadedCount,
            loading,
            hasQueried,
            fullResults,
            showMobileModal,
            closeMobileModal,
            reranking,
            applyReranking,
            isActive,
            handleClickOutside,
            updateReplicatedValue,
            tempFile,
            isListening,
            itemSelected,
            isFullscreen,
            detailExpanded,
            toggleDetailExpanded,
            resultListWidth,
            searchContentRow,
            handleKeyDown,
            icons,
            viewItem,
            handleResultSearchClick,
            busy,
            width,
            authorities_title,
            active_tab,
            filteredBtnContents,
            handleFilter,
            handleMetadataDownload,
            formatMetadataKey,
            hasMetadataValue,
            groupKeywordsByVocabulary,
            formatAuthorsForDisplay,
            isNameCodeArray,
            formatNameCodeList,
            formatGeographicCoverageForInline,
            format_authorities_title,
            pageLoading,
            metadata,
            pdfURL,
            pdfURLSameOrigin,
            pdfIframeSrc,
            pdfLoading,
            pdfLoadTimeout,
            onPdfIframeLoad,
            loadingMessage,
            loadingPhase,
            modelReady,
            indexReady,
            skipModelLoad,
            modelLoadDelaySeconds,
          };
        },
      })
        .use(vuetify)
        .component("v-icon-custom", VIconCustom)
        .component("MetadataValue", MetadataValue)
        .mount("#app");
    </script>
  </body>
</html>
